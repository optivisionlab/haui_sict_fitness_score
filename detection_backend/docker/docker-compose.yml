version: "1.0"
services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
  broker:
    image: apache/kafka:latest
    container_name: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://broker:9036,EXTERNAL://0.0.0.0:9098,CONTROLLER://broker:9099
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:9036,EXTERNAL://10.100.200.119:9098
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9099
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL 
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9036:9036"  
      - "9098:9098"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:9036
    depends_on:
      - broker
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - 27017:27017
    
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass


  mediamtx:
    image: bluenviron/mediamtx:1.9.0
    container_name: mediamtx
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    command: /mediamtx.yml
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889/udp"
      - "8889:8889/tcp"
    
  ffmpeg_cam1:
    image: linuxserver/ffmpeg:latest
    container_name: ffmpeg_cam1
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./video:/video
    command: >
      -stream_loop -1 
      -re 
      -fflags nobuffer 
      -flags low_delay 
      -i /video/IMG_0503.MOV
      -an 
      -vf scale=640:360 
      -c:v libx264 
      -preset ultrafast 
      -tune zerolatency 
      -pix_fmt yuv420p 
      -g 30 
      -keyint_min 30 
      -sc_threshold 0 
      -rtsp_transport udp 
      -f rtsp rtsp://mediamtx:8554/cam1

